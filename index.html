<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Plus Live Stream Embed</title>
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- 5 Plus Live Stream Frame -->
    <div class="video-container">
        <!-- 
            Note: ဤ iframe source သည် myanmartvchannels.com မှ video frame ကို တိုက်ရိုက်ယူထားခြင်း ဖြစ်သည်။
            အကယ်၍ source ဝက်ဘ်ဆိုက်မှ block လုပ်ထားပါက အလုပ်မလုပ်နိုင်ပါ။
        -->
        <iframe src="https://www.myanmartvchannels.com/5-plus-channel.html#SD%201" 
                allowfullscreen 
                scrolling="no" 
                allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <p>အကယ်၍ အပေါ်က frame အလုပ်မလုပ်ပါက၊ ဤ link ကို စမ်းကြည့်ပါ - 
        <a href="https://www.myanmartvchannels.com/5-plus-channel.html#SD%201" target="_blank">5 Plus Live</a>
    </p>

</body>
</html>
